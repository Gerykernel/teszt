<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webshop Kosárral & Adminnal</title>
    <style>
        /* --- CSS STÍLUSOK --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
        }
        header {
            background-color: #343a40;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        nav { margin-top: 10px; }
        nav button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 0 5px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }
        nav button:hover { background-color: #0056b3; }
        #cart-nav-btn { background-color: #e83e8c; }
        #cart-nav-btn:hover { background-color: #c23375; }
        
        .container {
            max-width: 1000px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        /* Webshop nézet */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .product-card {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            background: #fff;
        }
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px;
            background-color: #eee;
        }
        .price {
            font-size: 1.2rem;
            color: #28a745;
            font-weight: bold;
        }
        .buy-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
        }
        .buy-btn:hover { background-color: #218838; }

        /* Kosár nézet */
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #dee2e6;
        }
        .cart-total {
            margin-top: 20px;
            text-align: right;
            font-size: 1.5rem;
        }
        .checkout-btn {
            background-color: #17a2b8;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
        }
        .checkout-btn:hover { background-color: #138496; }

        /* Admin nézet */
        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin-bottom: 30px;
        }
        .admin-form input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .submit-btn {
            background-color: #ffc107;
            color: #000;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .submit-btn:hover { background-color: #e0a800; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #dee2e6; padding: 10px; text-align: left; }
        th { background-color: #f8f9fa; }
        .delete-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }
        .delete-btn:hover { background-color: #c82333; }

        /* Segéd osztály */
        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>RCBase</h1>
        <nav>
            <button onclick="switchView('shop')">Webshop</button>
            <button id="cart-nav-btn" onclick="switchView('cart')">Kosár (0)</button>
            <button onclick="switchView('admin')">Admin Panel</button>
        </nav>
    </header>

    <div class="container">
        <!-- WEBSHOP NÉZET -->
        <section id="shop-view">
            <h2>Termékeink</h2>
            <div id="product-list" class="product-grid"></div>
            <p id="empty-msg" class="hidden">Jelenleg nincs termék a webshopban. Lépj az Admin Panelre!</p>
        </section>

        <!-- KOSÁR NÉZET -->
        <section id="cart-view" class="hidden">
            <h2>A te kosarad</h2>
            <div id="cart-items">
                <!-- Kosár tartalma ide jön -->
            </div>
            <div class="cart-total">
                <p>Összesen fizetendő: <strong id="cart-total-price">0</strong> <strong>Ft</strong></p>
                <button class="checkout-btn" onclick="checkout()">Megrendelés leadása</button>
            </div>
        </section>

        <!-- ADMIN PANEL NÉZET -->
        <section id="admin-view" class="hidden">
            <h2>Új termék feltöltése</h2>
            <form class="admin-form" id="add-product-form">
                <input type="text" id="prod-name" placeholder="Termék neve" required>
                <input type="number" id="prod-price" placeholder="Ár (Ft)" required>
                <input type="url" id="prod-image" placeholder="Kép URL címe (pl. https://...)" required>
                <button type="submit" class="submit-btn">Termék Létrehozása</button>
            </form>

            <h2>Kezelt Termékek</h2>
            <div>
                <table>
                    <thead>
                        <tr>
                            <th>Kép</th>
                            <th>Név</th>
                            <th>Ár</th>
                            <th>Művelet</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- --- JAVASCRIPT LOGIKA --- -->
    <script>
        // Adatok lekérése a böngésző memóriájából
        let products = JSON.parse(localStorage.getItem('webshopProducts')) || [];
        let cart = JSON.parse(localStorage.getItem('webshopCart')) || [];

        // Oldal betöltésekor indítás
        document.addEventListener('DOMContentLoaded', () => {
            renderShop();
            renderAdminTable();
            updateCartCount();
        });

        // Nézetek közötti váltás
        function switchView(view) {
            document.getElementById('shop-view').classList.add('hidden');
            document.getElementById('cart-view').classList.add('hidden');
            document.getElementById('admin-view').classList.add('hidden');

            if (view === 'shop') {
                document.getElementById('shop-view').classList.remove('hidden');
                renderShop();
            } else if (view === 'cart') {
                document.getElementById('cart-view').classList.remove('hidden');
                renderCart();
            } else if (view === 'admin') {
                document.getElementById('admin-view').classList.remove('hidden');
                renderAdminTable();
            }
        }

        // --- KOSÁR FUNKCIÓK ---

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            // Megnézzük, benne van-e már a kosárban
            const existingItem = cart.find(item => item.id === productId);
            if (existingItem) {
                existingItem.quantity += 1; // Ha igen, növeljük a darabszámot
            } else {
                cart.push({ ...product, quantity: 1 }); // Ha nem, betesszük 1 darabbal
            }

            saveCart();
            updateCartCount();
            alert(`${product.name} bekerült a kosárba!`);
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            saveCart();
            updateCartCount();
            renderCart(); // Kosár újrarajzolása
        }

        function updateCartCount() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cart-nav-btn').innerText = `Kosár (${totalItems})`;
        }

        function renderCart() {
            const cartItemsDiv = document.getElementById('cart-items');
            cartItemsDiv.innerHTML = '';
            let totalPrice = 0;

            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<p>A kosarad jelenleg üres.</p>';
            } else {
                cart.forEach(item => {
                    const itemTotal = item.price * item.quantity;
                    totalPrice += itemTotal;
                    
                    cartItemsDiv.innerHTML += `
                        <div class="cart-item">
                            <div>
                                <strong style="font-size: 1.2rem;">${item.name}</strong><br>
                                ${item.price} Ft x ${item.quantity} db
                            </div>
                            <div style="text-align: right;">
                                <strong>${itemTotal} Ft</strong><br>
                                <button class="delete-btn" onclick="removeFromCart('${item.id}')" style="margin-top: 5px;">Törlés</button>
                            </div>
                        </div>
                    `;
                });
            }
            document.getElementById('cart-total-price').innerText = totalPrice;
        }

        function checkout() {
            if (cart.length === 0) {
                alert('A kosarad üres! Tegyél bele valamit a rendeléshez.');
                return;
            }
            alert('Sikeres rendelés! Köszönjük a vásárlást!');
            cart = []; // Kosár kiürítése
            saveCart();
            updateCartCount();
            switchView('shop'); // Vissza a vásárlótérbe
        }

        function saveCart() {
            localStorage.setItem('webshopCart', JSON.stringify(cart));
        }

        // --- WEBSHOP ÉS ADMIN FUNKCIÓK (Változatlan alapok, frissített gombokkal) ---

        document.getElementById('add-product-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('prod-name').value;
            const price = parseInt(document.getElementById('prod-price').value);
            const image = document.getElementById('prod-image').value;

            products.push({ id: Date.now().toString(), name, price, image });
            localStorage.setItem('webshopProducts', JSON.stringify(products));
            this.reset();
            renderAdminTable();
            alert('Termék hozzáadva!');
        });

        function deleteProduct(id) {
            if(confirm('Biztosan törlöd a terméket?')) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('webshopProducts', JSON.stringify(products));
                // Kosárból is töröljük, ha ott lenne
                cart = cart.filter(item => item.id !== id);
                saveCart();
                updateCartCount();
                renderAdminTable();
            }
        }

        function renderShop() {
            const productList = document.getElementById('product-list');
            const emptyMsg = document.getElementById('empty-msg');
            productList.innerHTML = '';

            if (products.length === 0) {
                emptyMsg.classList.remove('hidden');
            } else {
                emptyMsg.classList.add('hidden');
                products.forEach(product => {
                    productList.innerHTML += `
                        <div class="product-card">
                            <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/250x200?text=Nincs+kép'">
                            <h3>${product.name}</h3>
                            <div class="price">${product.price} Ft</div>
                            <button class="buy-btn" onclick="addToCart('${product.id}')">Kosárba</button>
                        </div>
                    `;
                });
            }
        }

        function renderAdminTable() {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = '';
            products.forEach(product => {
                tbody.innerHTML += `
                    <tr>
                        <td><img src="${product.image}" style="width: 50px; height: 50px; object-fit: cover; border-radius:3px;"></td>
                        <td>${product.name}</td>
                        <td>${product.price} Ft</td>
                        <td><button class="delete-btn" onclick="deleteProduct('${product.id}')">Törlés</button></td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
